repos:
  # Ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Pyright (type checking)
  - repo: local
    hooks:
      - id: pyright
        name: pyright (uv)
        entry: uv run pyright
        language: system
        types: [python]

  # Pytest (run tests)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        types: [python]